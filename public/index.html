<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <script>
        // Check auth before page renders to prevent UI flash
        if (!sessionStorage.getItem('chat_token') || !sessionStorage.getItem('chat_username')) {
            window.location.replace('/login.html');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #1e293b;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .user-profile {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile span {
            font-weight: 500;
            color: #818cf8;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
            position: relative;
        }

        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 60%;
            display: flex;
            flex-direction: column;
        }

        .message-username {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            margin-left: 12px;
        }

        .message-bubble {
            background: var(--surface);
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 15px;
            line-height: 1.4;
        }

        .message.self {
            align-self: flex-end;
        }

        .message.self .message-username {
            text-align: right;
            margin-right: 12px;
        }

        .message.self .message-bubble {
            background: var(--primary);
            border-color: var(--primary-hover);
        }

        .typing-indicator {
            padding: 0 30px 15px 30px;
            font-size: 13px;
            color: #818cf8;
            font-style: italic;
            min-height: 20px;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }

        .form-container {
            display: flex;
            gap: 15px;
        }

        .input-box {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 100px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .send-btn {
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(2px);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">Nexus Chat</div>

        <div class="online-users-container" style="flex: 1; overflow-y: auto; margin-bottom: 20px;">
            <h3
                style="color: var(--text-muted); font-size: 13px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">
                Active Users</h3>
            <ul id="online-users-list" style="list-style: none; display: flex; flex-direction: column; gap: 12px;">
                <!-- Active users go here -->
            </ul>
        </div>

        <div class="user-profile">
            <span id="current-username">Loading...</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-mode-indicator" style="background: rgba(99, 102, 241, 0.1); padding: 12px 30px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; color: #818cf8; text-align: center;">
            Global Chat Room
        </div>
        <div class="messages" id="messages">
            <!-- Messages go here -->
        </div>

        <div class="typing-indicator" id="typing-indicator"></div>

        <div class="input-area">
            <form class="form-container" id="form">
                <input type="text" id="input" class="input-box" placeholder="Type a message..." autocomplete="off" />
                <button class="send-btn" type="submit">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 1. Verify User has VIP Wristband
        const token = sessionStorage.getItem('chat_token');
        const myUsername = sessionStorage.getItem('chat_username');

        document.getElementById('current-username').innerText = myUsername;

        // 2. Connect to Socket.io with the Wristband
        const socket = io({
            auth: { token: token }
        });

        // 3. Security Error Handling
        socket.on('connect_error', (err) => {
            console.error("Connection failed:", err.message);
            logout(); // Kick them out if token is fake/expired
        });

        const messages = document.getElementById('messages');
        const form = document.getElementById('form');
        const input = document.getElementById('input');

        // Render a single message bubble
        function appendMessage(user, text) {
            const isSelf = user === myUsername;
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            if (isSelf) messageDiv.classList.add('self');

            messageDiv.innerHTML = `
                <div class="message-username">${user}</div>
                <div class="message-bubble">${text}</div>
            `;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight; // Auto-scroll down
        }

        // 4. Load History (Only runs when you first connect)
        socket.on('chat history', (historyArray) => {
            messages.innerHTML = ''; // Clear loading state
            historyArray.forEach(msg => {
                appendMessage(msg.username, msg.text);
            });
        });

        // --- Render Online Users List ---
        const onlineUsersList = document.getElementById('online-users-list');
        let privateTarget = null;
        const modeIndicator = document.getElementById('chat-mode-indicator');

        socket.on('online users', (usersArray) => {
            onlineUsersList.innerHTML = '';
            
            // If the person we were chatting with goes offline, reset to global
            if (privateTarget && !usersArray.includes(privateTarget)) {
                privateTarget = null;
                modeIndicator.innerText = 'Global Chat Room';
            }

            usersArray.forEach(user => {
                const li = document.createElement('li');
                li.style.display = 'flex';
                li.style.alignItems = 'center';
                li.style.gap = '10px';
                li.style.color = user === myUsername ? '#818cf8' : '#e2e8f0';
                li.style.fontSize = '15px';
                li.style.fontWeight = user === myUsername ? '600' : '400';
                li.style.cursor = user === myUsername ? 'default' : 'pointer';
                li.style.padding = '6px 10px';
                li.style.borderRadius = '8px';
                li.style.transition = 'background 0.2s';

                li.innerHTML = `
                    <span style="width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);"></span>
                    ${user} ${user === myUsername ? '(You)' : ''}
                `;

                if (user !== myUsername) {
                    li.addEventListener('mouseenter', () => li.style.background = 'rgba(255,255,255,0.05)');
                    li.addEventListener('mouseleave', () => li.style.background = 'transparent');
                    
                    li.addEventListener('click', () => {
                        if (privateTarget === user) {
                            privateTarget = null;
                            modeIndicator.innerText = 'Global Chat Room';
                        } else {
                            privateTarget = user;
                            modeIndicator.innerText = `🔒 Private Chat with: ${user}`;
                        }
                    });
                }
                onlineUsersList.appendChild(li);
            });
        });

        // 5. Receive a New Live Message
        socket.on('chat message', (data) => {
            appendMessage(data.username, data.text);
        });

        socket.on('private message', (data) => {
            appendMessage(data.username, `🔒 [Private] ${data.text}`);
        });

        // --- Typing Indicator Logic ---
        const typingIndicator = document.getElementById('typing-indicator');
        let typingTimeout;

        input.addEventListener('input', () => {
            socket.emit('typing');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop typing');
            }, 2000);
        });

        socket.on('user typing', (username) => {
            typingIndicator.innerText = `${username} is typing...`;
        });

        socket.on('user stopped typing', () => {
            typingIndicator.innerText = '';
        });

        // 6. Send a Message
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                if (privateTarget) {
                    socket.emit('private message', { targetUsername: privateTarget, text: input.value });
                } else {
                    socket.emit('chat message', input.value);
                }
                input.value = '';
            }
        });

        // Logout function
        function logout() {
            sessionStorage.removeItem('chat_token');
            sessionStorage.removeItem('chat_username');
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>
