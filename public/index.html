<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #1e293b;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .user-profile {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile span {
            font-weight: 500;
            color: #818cf8;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
            position: relative;
        }

        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 60%;
            display: flex;
            flex-direction: column;
        }

        .message-username {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            margin-left: 12px;
        }

        .message-bubble {
            background: var(--surface);
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 15px;
            line-height: 1.4;
        }

        .message.self {
            align-self: flex-end;
        }

        .message.self .message-username {
            text-align: right;
            margin-right: 12px;
        }

        .message.self .message-bubble {
            background: var(--primary);
            border-color: var(--primary-hover);
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }

        .form-container {
            display: flex;
            gap: 15px;
        }

        .input-box {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 100px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .send-btn {
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(2px);
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Nexus Chat</div>
        
        <div class="user-profile">
            <span id="current-username">Loading...</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <!-- Messages go here -->
        </div>

        <div class="input-area">
            <form class="form-container" id="form">
                <input type="text" id="input" class="input-box" placeholder="Type a message..." autocomplete="off" />
                <button class="send-btn" type="submit">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 1. Verify User has VIP Wristband
        const token = localStorage.getItem('chat_token');
        const myUsername = localStorage.getItem('chat_username');

        if (!token || !myUsername) {
            window.location.href = '/login.html'; // Kick them out!
        }

        document.getElementById('current-username').innerText = myUsername;

        // 2. Connect to Socket.io with the Wristband
        const socket = io({
            auth: { token: token }
        });

        // 3. Security Error Handling
        socket.on('connect_error', (err) => {
            console.error("Connection failed:", err.message);
            logout(); // Kick them out if token is fake/expired
        });

        const messages = document.getElementById('messages');
        const form = document.getElementById('form');
        const input = document.getElementById('input');

        // Render a single message bubble
        function appendMessage(user, text) {
            const isSelf = user === myUsername;
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            if (isSelf) messageDiv.classList.add('self');

            messageDiv.innerHTML = `
                <div class="message-username">${user}</div>
                <div class="message-bubble">${text}</div>
            `;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight; // Auto-scroll down
        }

        // 4. Load History (Only runs when you first connect)
        socket.on('chat history', (historyArray) => {
            messages.innerHTML = ''; // Clear loading state
            historyArray.forEach(msg => {
                appendMessage(msg.username, msg.text);
            });
        });

        // 5. Receive a New Live Message
        socket.on('chat message', (data) => {
            appendMessage(data.username, data.text);
        });

        // 6. Send a Message
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        // Logout function
        function logout() {
            localStorage.removeItem('chat_token');
            localStorage.removeItem('chat_username');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
