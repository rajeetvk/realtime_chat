<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Real-Time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color));
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { width: 300px; height: 300px; background: #6366f1; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #ec4899; bottom: -150px; right: -150px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .auth-container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: height 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .toggle-text span {
            color: #818cf8;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
        }

        .toggle-text span:hover {
            color: #c084fc;
        }

        #error-msg {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 20px;
        }

        /* Toggle between forms */
        #register-form {
            display: none;
        }

    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-container">
        <!-- Login Form -->
        <div id="login-form">
            <div class="header">
                <h1>Welcome Back</h1>
                <p>Log in to join the chat</p>
            </div>
            <div id="login-error" id="error-msg"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="toggle-text">
                Don't have an account? <span onclick="toggleForms()">Sign up</span>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form">
            <div class="header">
                <h1>Create Account</h1>
                <p>Start chatting in seconds</p>
            </div>
            <div id="register-error" id="error-msg"></div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Choose Username</label>
                    <input type="text" id="reg-username" required placeholder="Creative name">
                </div>
                <div class="form-group">
                    <label>Choose Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="background: #ec4899;">Sign Up</button>
            </form>
            <div class="toggle-text">
                Already have an account? <span onclick="toggleForms()">Log in</span>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    errorDiv.innerText = data.error;
                    errorDiv.style.color = '#ef4444';
                } else {
                    errorDiv.innerText = "Success! Please log in.";
                    errorDiv.style.color = '#10b981';
                    setTimeout(toggleForms, 1500); // Switch to login after success
                }
            } catch (err) {
                errorDiv.innerText = "Server error. Try again later.";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    errorDiv.innerText = data.error;
                } else {
                    // 🎉 Save the VIP Wristband to LocalStorage!
                    localStorage.setItem('chat_token', data.token);
                    localStorage.setItem('chat_username', data.username);
                    
                    // Redirect to the actual chat page
                    window.location.href = '/index.html';
                }
            } catch (err) {
                errorDiv.innerText = "Server error. Try again later.";
            }
        }
    </script>
</body>
</html>
